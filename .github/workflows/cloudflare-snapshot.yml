name: Cloudflare free snapshot

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "cloudflare/**"
      - "scripts/**"
      - "src/**"
      - "workers/worldcup-sync/migrations/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.mjs"
      - "wrangler.jsonc"

permissions:
  contents: read

concurrency:
  group: cloudflare-worldcup-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 14
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: fb8c88e6-41af-4f6f-b372-9fdfa5b72845
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      WORLD_CUP_DATA_DIR: ${{ github.workspace }}/.local
      SITE_SNAPSHOT_URL: http://127.0.0.1:3100
      WORLDCUP_SITE_URL: http://127.0.0.1:3100
      SNAPSHOT_BUILD_ID: ${{ github.sha }}
      APP_ENV: snapshot
      MODEL_CHECK_MATCH_IDS: M099,M100,M101
      NODE_OPTIONS: --no-deprecation

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate required secrets
        shell: bash
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
      - run: npm ci
      - name: Apply additive D1 migrations
        if: github.event_name != 'schedule'
        run: npx wrangler d1 migrations apply worldcup-predictor-data --remote
      - name: Export current D1 state
        run: |
          mkdir -p .runner .local
          npx wrangler d1 export worldcup-predictor-data --remote --output .runner/remote.sql
      - name: Restore temporary runner database
        run: npm run snapshot:restore -- .runner/remote.sql .local
      - name: Refresh verified results without clearing prior data
        run: npm run refresh:results
      - run: npm run typecheck
      - run: npm run check:result-sync
      - run: npm run check:prediction-snapshots
      - run: npm run build
      - name: Start temporary snapshot renderer
        shell: bash
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3100 > .runner/site.log 2>&1 &
          echo $! > .runner/site.pid
          for attempt in {1..60}; do
            curl --fail --silent http://127.0.0.1:3100/ > /dev/null && exit 0
            sleep 1
          done
          cat .runner/site.log
          exit 1
      - run: npm run check:model-variants
      - run: npm run check:site-health
        env:
          SITE_HEALTH_URL: http://127.0.0.1:3100
      - name: Capture six precomputed pages
        run: npm run snapshot:capture
      - name: Publish result deltas and atomically switch snapshot pointer
        run: npm run snapshot:publish
      - name: Prepare static assets
        if: github.event_name != 'schedule'
        run: node scripts/prepare-worker-assets.mjs
      - name: Deploy Worker code only on code changes or manual runs
        if: github.event_name != 'schedule'
        run: npx wrangler deploy
      - name: Public smoke test
        if: github.event_name != 'schedule'
        shell: bash
        run: |
          for route in / /bracket /matches /review /groups /sources; do
            curl --fail --retry 4 --retry-delay 3 "https://worldcup-predictor.worldcupball.workers.dev${route}" > /dev/null
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snapshot-summary-${{ github.run_id }}
          path: |
            .snapshot/manifest.json
            .runner/site.log
          if-no-files-found: ignore
          retention-days: 7
